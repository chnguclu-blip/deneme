<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Korucu ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* Radial glow */
        body::after {
            content: '';
            position: fixed;
            top: 20%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, transparent 70%);
            transform: translateX(-50%);
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(6, 182, 212, 0.4);
            }
        }

        .logo-icon span {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 24px;
            color: white;
        }

        .logo-title {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 0.15em;
            color: #f1f5f9;
        }

        .logo-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.25em;
            color: #475569;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Card */
        .login-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.3), transparent);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 10px;
            color: #e2e8f0;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1), 0 0 20px rgba(6, 182, 212, 0.05);
        }

        .form-group input::placeholder {
            color: #334155;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.03em;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.3);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message::before {
            content: '⚠';
            font-size: 16px;
        }

        /* Footer text */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #334155;
            letter-spacing: 0.1em;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="logo-area">
            <div class="logo-icon"><span>K</span></div>
            <div class="logo-title">KORUCU</div>
            <div class="logo-sub">ERP Yönetim Sistemi</div>
        </div>

        <div class="login-card">
            {% if form.errors %}
            <div class="error-message">
                Kullanıcı adı veya şifre hatalı.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Kullanıcı Adı</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label for="id_password">Şifre</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn-login">Giriş Yap</button>
            </form>
        </div>

        <div class="login-footer">
            KORUCU MAKİNA — Takip Otomasyonu v2.0
        </div>
    </div>

</body>

</html>
