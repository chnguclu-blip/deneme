{% extends 'products/base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        <div class="flex items-center mb-6 border-b pb-2">
            <a href="javascript:history.back()"
                class="mr-4 flex items-center justify-center w-10 h-10 rounded-full bg-white border border-gray-300 text-gray-600 hover:text-blue-600 hover:border-blue-500 hover:bg-blue-50 transition-all duration-200 shadow-sm"
                title="Geri">
                <i class="fas fa-arrow-left cursor-pointer text-lg"></i>
            </a>
            <h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="id_name">
                    Müşteri Adı / Unvanı
                </label>
                {{ form.name }}
                {% if form.name.errors %}
                <p class="text-red-500 text-xs italic">{{ form.name.errors.0 }}</p>
                {% endif %}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="id_phone">
                        Telefon
                    </label>
                    {{ form.phone }}
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="id_email">
                        E-Posta
                    </label>
                    {{ form.email }}
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="id_tax_number">
                        Vergi No / VKN
                    </label>
                    {{ form.tax_number }}
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="id_country">
                        Ülke
                    </label>
                    {{ form.country }}
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="id_address">
                    Adres
                </label>
                {{ form.address }}
            </div>

            <div class="flex items-center justify-between">
                <a href="{% url 'customer_list' %}"
                    class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    İptal
                </a>
                <button
                    class="bg-blue-600 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    type="submit">
                    Kaydet
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
