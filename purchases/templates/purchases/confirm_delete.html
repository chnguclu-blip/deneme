{% extends 'products/base.html' %}

{% block title %}Silme Onayı{% endblock %}

{% block page_title %}Silme Onayı{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-lg border border-red-100 overflow-hidden">
        <div class="bg-red-50 px-6 py-4 border-b border-red-100 flex items-center gap-3">
            <div class="p-2 bg-red-100 rounded-full text-red-600">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-red-800 font-bold text-lg">Dikkat!</h3>
        </div>

        <div class="p-6">
            <p class="text-gray-700 mb-6 text-lg">
                <strong>{{ object }}</strong> {{ type }} kaydını silmek istediğinize emin misiniz? <br>
                <span class="text-sm text-red-500 mt-2 block">Bu işlem geri alınamaz!</span>
            </p>

            <form method="POST" class="flex justify-end gap-3">
                {% csrf_token %}
                <a href="javascript:history.back()"
                    class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">İptal</a>
                <button type="submit"
                    class="px-5 py-2.5 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-bold shadow-sm">
                    Evet, Sil
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
